name: Secret Scan (Reusable)

on:
  workflow_call:
    inputs:
      fail-on-findings:
        description: '시크릿 발견 시 워크플로우 실패 여부'
        type: boolean
        default: false

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Run Gitleaks
        id: scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-${{ github.event.repository.name }}
          path: results.sarif
          if-no-files-found: ignore

      - name: Fail on findings
        if: inputs.fail-on-findings && steps.scan.outcome == 'failure'
        run: echo "::error::Gitleaks 시크릿 발견 — 아티팩트를 확인하세요." && exit 1

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        id: scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /repo \
            --results=verified,unknown \
            --json > trufflehog-results.json
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-${{ github.event.repository.name }}
          path: trufflehog-results.json
          if-no-files-found: ignore

      - name: Fail on findings
        if: inputs.fail-on-findings && steps.scan.outcome == 'failure'
        run: echo "::error::TruffleHog 검증된 시크릿 발견 — 아티팩트를 확인하세요." && exit 1
