name: Secret Scan (Reusable)

on:
  workflow_call:
    inputs:
      fail-on-findings:
        description: '시크릿 발견 시 워크플로우 실패 여부'
        type: boolean
        default: false

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Run Gitleaks
        id: scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        continue-on-error: true

      - name: Check Gitleaks results
        if: always()
        run: |
          if [ -f results.sarif ]; then
            COUNT=$(jq '.runs[0].results | length' results.sarif || echo 0)
            if [ "$COUNT" -gt 0 ]; then
              echo "::warning::🔴 Gitleaks found $COUNT secrets"
            else
              echo "::notice::✅ Gitleaks found no secrets"
            fi
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-${{ github.event.repository.name }}
          path: results.sarif
          if-no-files-found: ignore

      - name: Fail on findings
        if: inputs.fail-on-findings && steps.scan.outcome == 'failure'
        run: echo "::error::Gitleaks 시크릿 발견 — 아티팩트를 확인하세요." && exit 1

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        id: scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///repo --since-commit "" \
            --json --no-update > trufflehog-results.json || true
        continue-on-error: true

      - name: Check findings
        id: check
        run: |
          if [ -f trufflehog-results.json ]; then
            COUNT=$(cat trufflehog-results.json | grep -c '"DetectorName"' || echo 0)
            echo "findings=$COUNT" >> $GITHUB_OUTPUT
            
            if [ "$COUNT" -gt 0 ]; then
              echo "::warning::🔴 TruffleHog found $COUNT potential secrets"
              cat trufflehog-results.json | jq -r '.[] | "::warning file=\(.SourceMetadata.Data.Git.file),line=\(.SourceMetadata.Data.Git.line)::[", .DetectorName, "] Secret detected"' || true
            else
              echo "::notice::✅ TruffleHog found no secrets"
            fi
          else
            echo "findings=0" >> $GITHUB_OUTPUT
            echo "::notice::✅ TruffleHog found no secrets"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-${{ github.event.repository.name }}
          path: trufflehog-results.json
          if-no-files-found: ignore

      - name: Fail on findings
        if: inputs.fail-on-findings && steps.check.outputs.findings != '0'
        run: echo "::error::TruffleHog 시크릿 발견 — 아티팩트를 확인하세요." && exit 1
